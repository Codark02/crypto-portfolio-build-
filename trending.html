<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending Coins - CryptoPortfolio</title>
  <meta name="description" content="Real-time prices for thousands of cryptocurrencies.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background: #f8fafc; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }
    header { background: #0f172a; color: white; position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; gap: 12px; }
    .logo { font-size: 1.5rem; font-weight: 700; color: #22c55e; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-links { display: flex; gap: 1.1rem; list-style: none; }
    .nav-links a { color: white; text-decoration: none; font-size: 0.95rem; }
    .wallet-btn { border: none; border-radius: 999px; padding: 9px 14px; background: #22c55e; color: white; font-weight: 700; cursor: pointer; }
    .wallet-btn.connected { background: #1d4ed8; }
    .mobile-menu-btn { display: none; border: none; background: none; color: white; font-size: 1.6rem; cursor: pointer; }
    .hero { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 60px 0; text-align: center; }
    .hero h1 { font-size: 2.4rem; margin-bottom: 8px; }
    .hero p { color: #cbd5e1; }
    .filters { background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 62px; z-index: 900; }
    .filter-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; padding: 12px 0; }
    input, select, button { font: inherit; }
    #searchInput, #sortBy, #coinLimit { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; }
    #searchBtn, #refreshBtn { padding: 10px 14px; border-radius: 8px; border: none; background: #0f172a; color: white; cursor: pointer; }
    .table-wrap { overflow: auto; -webkit-overflow-scrolling: touch; margin-top: 16px; border-radius: 12px; background: white; box-shadow: 0 4px 20px rgba(2,6,23,0.08); }
    table { border-collapse: collapse; width: 100%; min-width: 980px; }
    th { background: #0f172a; color: white; text-align: left; padding: 12px; position: sticky; top: 0; }
    td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    tr:hover { background: #f8fafc; }
    .coin-cell { display: flex; align-items: center; gap: 10px; }
    .coin-cell img { width: 30px; height: 30px; border-radius: 50%; }
    .positive { color: #16a34a; font-weight: 700; }
    .negative { color: #ef4444; font-weight: 700; }
    .meta-row { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 10px 0 16px; color: #475569; }
    .pagination { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 18px 0 36px; }
    .page-btn { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; cursor: pointer; }
    .page-btn.active { background: #22c55e; color: white; border-color: #22c55e; }
    footer { background: #0f172a; color: white; text-align: center; padding: 44px 0 24px; margin-top: 30px; }
    @media (max-width: 920px) {
      .mobile-menu-btn { display: block; }
      .nav-links { position: fixed; top: 62px; left: -100%; width: 100%; height: calc(100vh - 62px); background: #0f172a; flex-direction: column; align-items: center; padding-top: 38px; transition: left 0.25s ease; }
      .nav-links.active { left: 0; }
      .filter-row { grid-template-columns: 1fr 1fr; }
      #searchBtn, #refreshBtn { width: 100%; }
      .hero h1 { font-size: 1.9rem; }
      .filters { top: 60px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a class="logo" href="index.html">CryptoPortfolio</a>
        <div class="nav-right">
          <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="swap.html">Swap</a></li>
            <li><a href="trending.html">Trending</a></li>
            <li><a href="how-to-buy.html">How to Buy</a></li>
            <li><a href="where-to-buy.html">Where to Buy</a></li>
            <li><a href="about.html">About</a></li>
          </ul>
          <button id="navConnectBtn" class="wallet-btn">Connect Wallet</button>
          <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Thousands of Coins, Real-Time</h1>
      <p>Search and monitor live price changes across the market.</p>
    </div>
  </section>

  <div class="filters">
    <div class="container">
      <div class="filter-row">
        <input id="searchInput" placeholder="Search coin name or symbol">
        <select id="sortBy">
          <option value="market_cap">Sort: Market Cap</option>
          <option value="price">Sort: Price</option>
          <option value="change">Sort: 24h Change</option>
        </select>
        <select id="coinLimit">
          <option value="500">500 Coins</option>
          <option value="1000" selected>1000 Coins</option>
          <option value="2000">2000 Coins</option>
        </select>
        <button id="refreshBtn">Refresh Live Prices</button>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="meta-row">
      <div id="statusText">Loading coins...</div>
      <div id="updatedAt">--</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Coin</th><th>Price</th><th>24h</th><th>Market Cap</th><th>Volume</th><th>Trade</th>
          </tr>
        </thead>
        <tbody id="coinTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 CryptoPortfolio</p>
    </div>
  </footer>

  <script>
    const navLinks = document.getElementById('navLinks');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    mobileMenuBtn.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      mobileMenuBtn.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
    });

    const fmt = (n, d = 2) => new Intl.NumberFormat('en-US', { maximumFractionDigits: d }).format(n || 0);
    const PAGE_SIZE = 40;
    let allCoins = [];
    let filteredCoins = [];
    let page = 1;

    function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

    async function fetchMarketsPage(pageNum) {
      const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${pageNum}&sparkline=false&price_change_percentage=24h`;
      const res = await fetch(url);
      if (!res.ok) {
        const err = new Error('HTTP ' + res.status);
        err.status = res.status;
        throw err;
      }
      const data = await res.json();
      if (!Array.isArray(data)) return [];
      return data;
    }

    async function fetchCoins(limit) {
      const pages = Math.ceil(limit / 250);
      const requests = [];
      for (let i = 1; i <= pages; i++) {
        requests.push(fetchMarketsPage(i));
      }

      // Allow partial success: if some pages fail (rate limit), use the ones that worked.
      const settled = await Promise.allSettled(requests);
      const okChunks = settled
        .filter((r) => r.status === 'fulfilled')
        .map((r) => r.value);

      const merged = okChunks.flat().slice(0, limit);
      if (!merged.length) {
        // If everything failed, throw the first error so caller can backoff.
        const firstErr = settled.find((r) => r.status === 'rejected');
        throw (firstErr ? firstErr.reason : new Error('No data'));
      }
      return merged;
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const sortBy = document.getElementById('sortBy').value;
      filteredCoins = allCoins.filter((c) => c.name.toLowerCase().includes(search) || c.symbol.toLowerCase().includes(search));
      filteredCoins.sort((a, b) => {
        if (sortBy === 'price') return (b.current_price || 0) - (a.current_price || 0);
        if (sortBy === 'change') return (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0);
        return (b.market_cap || 0) - (a.market_cap || 0);
      });
      page = 1;
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('coinTableBody');
      tbody.innerHTML = '';
      const start = (page - 1) * PAGE_SIZE;
      const rows = filteredCoins.slice(start, start + PAGE_SIZE);
      rows.forEach((coin, idx) => {
        const change = coin.price_change_percentage_24h || 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${start + idx + 1}</td><td><div class="coin-cell"><img src="${coin.image}" alt="${coin.symbol}"><div><div>${coin.name}</div><small>${coin.symbol.toUpperCase()}</small></div></div></td><td>$${fmt(coin.current_price, 6)}</td><td class="${change >= 0 ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</td><td>$${fmt(coin.market_cap, 0)}</td><td>$${fmt(coin.total_volume, 0)}</td><td><a href="https://www.coingecko.com/en/coins/${coin.id}" target="_blank" rel="noopener">Open</a></td>`;
        tbody.appendChild(tr);
      });
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(filteredCoins.length / PAGE_SIZE));
      const el = document.getElementById('pagination');
      el.innerHTML = '';
      const start = Math.max(1, page - 2);
      const end = Math.min(totalPages, page + 2);
      for (let i = start; i <= end; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === page ? ' active' : '');
        btn.textContent = i;
        btn.addEventListener('click', () => { page = i; renderTable(); });
        el.appendChild(btn);
      }
    }

    let refreshTimer = null;
    let backoffMs = 15000;
    let isLoading = false;

    async function loadCoins({ silent = false } = {}) {
      if (isLoading) return;
      isLoading = true;
      const limit = Number(document.getElementById('coinLimit').value);

      if (!silent) {
        document.getElementById('statusText').textContent = `Loading ${limit} coins...`;
      }

      try {
        const nextCoins = await fetchCoins(limit);
        allCoins = nextCoins;
        applyFilters();
        document.getElementById('statusText').textContent = `${filteredCoins.length} coins loaded`;
        document.getElementById('updatedAt').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        backoffMs = 15000; // reset on success
      } catch (err) {
        // Don't wipe out existing data — keep search working with cached results.
        const hadCache = allCoins.length > 0;
        const status = (err && err.status) ? err.status : null;
        if (status === 429) {
          document.getElementById('statusText').textContent = hadCache
            ? `Rate limited (429). Showing cached coins. Retrying in ${Math.round(backoffMs / 1000)}s...`
            : `Rate limited (429). Retrying in ${Math.round(backoffMs / 1000)}s...`;
        } else {
          document.getElementById('statusText').textContent = hadCache
            ? `Network error. Showing cached coins. Retrying in ${Math.round(backoffMs / 1000)}s...`
            : `Could not load coins right now. Retrying in ${Math.round(backoffMs / 1000)}s...`;
        }
        backoffMs = Math.min(backoffMs * 2, 120000);
      } finally {
        isLoading = false;
        scheduleAutoRefresh();
      }
    }

    function scheduleAutoRefresh() {
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => loadCoins({ silent: true }), backoffMs);
    }

    document.getElementById('searchInput').addEventListener('input', () => {
      // Searching should never trigger network calls; it only filters cached data.
      applyFilters();
    });
    document.getElementById('sortBy').addEventListener('change', applyFilters);
    document.getElementById('coinLimit').addEventListener('change', loadCoins);
    document.getElementById('refreshBtn').addEventListener('click', loadCoins);
    loadCoins();

    const navConnectBtn = document.getElementById('navConnectBtn');
    async function connectAnyWallet() {
      try {
        if (window.ethereum) {
          const provider = Array.isArray(window.ethereum.providers) ? window.ethereum.providers[0] : window.ethereum;
          const accounts = await provider.request({ method: 'eth_requestAccounts' });
          if (accounts && accounts[0]) {
            const a = accounts[0];
            navConnectBtn.textContent = a.slice(0, 6) + '...' + a.slice(-4);
            navConnectBtn.classList.add('connected');
            return;
          }
        }
        if (window.phantom && window.phantom.solana && window.phantom.solana.isPhantom) {
          const resp = await window.phantom.solana.connect();
          const p = resp.publicKey.toString();
          navConnectBtn.textContent = p.slice(0, 6) + '...' + p.slice(-4);
          navConnectBtn.classList.add('connected');
          return;
        }
        window.open(`https://metamask.app.link/dapp/${window.location.host}${window.location.pathname}`, '_blank');
      } catch {
        navConnectBtn.textContent = 'Try Again';
      }
    }
    navConnectBtn.addEventListener('click', connectAnyWallet);
  </script>
</body>
</html>
